<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Suivi Matériel</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<main class="login-page main-content">
    <section class="login-card">
        <header class="login-card__header">
            <h1>Connexion à suivi matériel</h1>
            <p>Accédez à votre espace sécurisé.</p>
        </header>

        <form id="loginForm" class="login-form">

            <button id="googleLoginButton" class="btn btn-google" type="button">
                <img src="Icon/btn_google.png" alt="Google">
                <span class="btn__label">Se connecter avec Google</span>
            </button>

            <p id="globalError" class="global-error"></p>

        </form>
    </section>
</main>

<footer class="app-footer">
    © 2026 Suivi Matériel — Tous droits réservés
</footer>

<script type="module" src="js/login.js"></script>

</body>
</html>
